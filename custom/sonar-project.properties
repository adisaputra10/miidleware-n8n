# SonarQube configuration for n8n Embed App
# Adjust sonar.host.url and login in CI environment variables (do not hard-code credentials here)

sonar.projectKey=n8n-embed-app
sonar.projectName=n8n Embed App
sonar.projectVersion=1.0

# Source files
sonar.sources=lib,routes,server-state.js,server.js

# Test directory
sonar.tests=tests

# Language
sonar.language=js

# Encoding
sonar.sourceEncoding=UTF-8

# Exclude generated/config files from analysis
sonar.exclusions=node_modules/**,data/**,views/**,coverage/**,*.config.js

# LCOV coverage report (generated by jest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test execution report (optional — requires jest-sonar-reporter for XML output)
# sonar.testExecutionReportPaths=coverage/test-report.xml
