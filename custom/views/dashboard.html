<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — n8n Workspace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #e5e5e5; overflow: hidden; }
    .layout { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar { width: 220px; flex-shrink: 0; background: #111; border-right: 1px solid #222; display: flex; flex-direction: column; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 16px 18px; border-bottom: 1px solid #1e1e1e; }
    .logo-icon { width: 30px; height: 30px; background: linear-gradient(135deg,#ff6d5a,#ff4f3b); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-icon svg { width: 16px; height: 16px; fill: #fff; }
    .logo-name { font-size: 14px; font-weight: 700; color: #f0f0f0; }
    nav { flex: 1; padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; color: #666; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; transition: background .12s, color .12s; }
    .nav-item:hover { background: #1a1a1a; color: #ccc; }
    .nav-item.active { background: #1e1e1e; color: #fff; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-user { padding: 12px 10px; border-top: 1px solid #1e1e1e; }
    .user-info { display: flex; align-items: center; gap: 8px; padding: 8px 10px; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg,#ff6d5a,#ff4f3b); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 500; color: #ccc; }
    .user-role { font-size: 11px; color: #555; }
    .btn-logout-side { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; background: none; border: none; color: #555; font-size: 12px; cursor: pointer; width: 100%; margin-top: 4px; transition: color .12s; }
    .btn-logout-side:hover { color: #f87171; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar { flex-shrink: 0; height: 50px; background: #111; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; padding: 0 20px; gap: 12px; }
    .topbar-title { font-size: 15px; font-weight: 600; color: #f0f0f0; flex: 1; }
    .btn-back { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; background: #1e1e1e; border: 1px solid #2e2e2e; color: #aaa; font-size: 13px; cursor: pointer; transition: color .12s, border-color .12s; }
    .btn-back:hover { color: #fff; border-color: #444; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,.5); flex-shrink: 0; }
    .status-dot.loading { background: #f59e0b; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }

    /* ── Card grid view ── */
    .cards-view { flex: 1; overflow-y: auto; padding: 24px; }
    .cards-view::-webkit-scrollbar { width: 5px; }
    .cards-view::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .proj-card { background: #161616; border: 1px solid #222; border-radius: 12px; padding: 20px; cursor: pointer; transition: border-color .15s, background .15s; display: flex; flex-direction: column; gap: 10px; }
    .proj-card:hover { border-color: #ff6d5a; background: #1a1a1a; }
    .proj-card.no-workflow { opacity: .55; cursor: default; }
    .proj-card.no-workflow:hover { border-color: #222; background: #161616; }
    .proj-card-name { font-size: 15px; font-weight: 700; color: #f0f0f0; }
    .proj-card-desc { font-size: 12px; color: #555; line-height: 1.5; }
    .proj-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: auto; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-active   { background: rgba(34,197,94,.12); color: #4ade80; }
    .badge-inactive { background: rgba(239,68,68,.12); color: #f87171; }
    .open-hint { font-size: 11px; color: #ff8575; }
    .empty-state { text-align: center; padding: 80px 24px; color: #444; grid-column: 1/-1; }
    .empty-state h3 { font-size: 16px; color: #555; margin-bottom: 8px; }

    /* ── Workflow view ── */
    .workflow-view { flex: 1; display: none; position: relative; overflow: hidden; background: #0d0d0d; }
    .workflow-view.open { display: block; }
    .overlay { position: absolute; inset: 0; background: #0d0d0d; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 5; transition: opacity .3s; }
    .spinner { width: 36px; height: 36px; border: 3px solid #222; border-top-color: #ff6d5a; border-radius: 50%; animation: spin .75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-label { font-size: 13px; color: #555; }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── Loading skeleton ── */
    .skel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .skel-card { background: #161616; border: 1px solid #1e1e1e; border-radius: 12px; padding: 20px; height: 110px; }
    .skel { background: linear-gradient(90deg,#1a1a1a 25%,#222 50%,#1a1a1a 75%); background-size:200%; animation: shimmer 1.4s infinite; border-radius:6px; height:14px; }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"/></svg></div>
      <span class="logo-name">n8n Workspace</span>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-user">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">?</div>
        <div>
          <div class="user-name" id="userName"></div>
          <div class="user-role" id="userRole"></div>
        </div>
      </div>
      <button class="btn-logout-side" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Keluar
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="status-dot" id="statusDot"></div>
      <span class="topbar-title" id="topbarTitle">Dashboard</span>
      <button class="btn-back" id="backBtn" onclick="showCards()" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg>
        Kembali
      </button>
    </div>

    <!-- Card grid -->
    <div class="cards-view" id="cardsView">
      <div class="skel-grid">
        <div class="skel-card"><div class="skel" style="width:60%;margin-bottom:10px"></div><div class="skel" style="width:40%"></div></div>
        <div class="skel-card"><div class="skel" style="width:70%;margin-bottom:10px"></div><div class="skel" style="width:50%"></div></div>
        <div class="skel-card"><div class="skel" style="width:55%;margin-bottom:10px"></div><div class="skel" style="width:35%"></div></div>
      </div>
    </div>

    <!-- Workflow iframe — hidden until a card is clicked -->
    <div class="workflow-view" id="workflowView">
      <div class="overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <span class="overlay-label">Memuat workflow...</span>
      </div>
      <iframe id="n8nFrame" src="" title="n8n Workflow"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads"
        referrerpolicy="same-origin"></iframe>
    </div>
  </div>
</div>

<script>
let me = null;

async function init() {
  me = await fetch('/api/me').then(r => r.json());
  document.getElementById('userName').textContent = me.username;
  document.getElementById('userRole').textContent = me.role.charAt(0).toUpperCase() + me.role.slice(1);
  document.getElementById('userAvatar').textContent = me.username.charAt(0).toUpperCase();
  buildNav();
  loadProjects();
}

function buildNav() {
  const links = [
    { href: '/app/dashboard',  label: 'Dashboard',  icon: '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>' },
    me.role === 'admin' ? { href: '/app/projects',   label: 'Projects',   icon: '<rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' } : null,
    me.role === 'admin' ? { href: '/app/users',      label: 'Users',      icon: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' } : null,
    me.role === 'admin' ? { href: '/app/settings',   label: 'Settings',   icon: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>' } : null,
  ].filter(Boolean);
  document.getElementById('nav').innerHTML = links.map(l => `
    <a href="${l.href}" class="nav-item ${location.pathname === l.href ? 'active' : ''}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${l.icon}</svg>
      ${l.label}
    </a>`).join('');
}

async function loadProjects() {
  const projects = await fetch('/api/projects').then(r => r.json().catch(() => []));
  const view = document.getElementById('cardsView');

  if (!projects.length) {
    view.innerHTML = `<div class="card-grid"><div class="empty-state">
      <h3>Belum ada project</h3>
      <p>${me.role === 'admin' ? 'Buat project baru di halaman <a href="/app/projects" style="color:#ff8575;text-decoration:none">Projects</a>.' : 'Belum ada project yang di-assign ke Anda.'}</p>
    </div></div>`;
    return;
  }

  view.innerHTML = '<div class="card-grid">' + projects.map(p => {
    const hasWorkflow = !!p.workflow_url;
    return `<div class="proj-card${hasWorkflow ? '' : ' no-workflow'}"
      ${hasWorkflow ? `onclick="openWorkflow(${p.id}, '${esc(p.workflow_url)}', '${esc(p.name)}')"` : ''}>
      <div class="proj-card-name">${esc(p.name)}</div>
      ${p.description ? `<div class="proj-card-desc">${esc(p.description)}</div>` : ''}
      <div class="proj-card-meta">
        <span class="badge ${p.is_active ? 'badge-active' : 'badge-inactive'}">${p.is_active ? 'Aktif' : 'Nonaktif'}</span>
        ${p.member_count !== undefined ? `<span style="font-size:11px;color:#555">${p.member_count} member</span>` : ''}
      </div>
      ${hasWorkflow ? `<div class="open-hint">Klik untuk buka workflow →</div>` : `<div style="font-size:11px;color:#444">Belum ada workflow</div>`}
    </div>`;
  }).join('') + '</div>';
}

async function openWorkflow(projectId, url, name) {
  await fetch(`/api/projects/${projectId}/n8n-token`, { method: 'POST' }).catch(() => {});
  // Clear n8n's localStorage cache so it doesn't try to fetch stale workflow IDs
  // that belong to other users (which would cause 403 errors in the iframe)
  try {
    Object.keys(localStorage)
      .filter(k => k.toLowerCase().startsWith('n8n'))
      .forEach(k => localStorage.removeItem(k));
  } catch {}
  document.getElementById('cardsView').style.display = 'none';
  document.getElementById('workflowView').classList.add('open');
  document.getElementById('topbarTitle').textContent = name;
  document.getElementById('backBtn').style.display = '';
  document.getElementById('statusDot').className = 'status-dot loading';
  document.getElementById('loadingOverlay').style.cssText = 'display:flex;opacity:1';
  document.getElementById('n8nFrame').src = url;
}

function showCards() {
  document.getElementById('workflowView').classList.remove('open');
  document.getElementById('n8nFrame').src = '';
  document.getElementById('cardsView').style.display = '';
  document.getElementById('topbarTitle').textContent = 'Dashboard';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('statusDot').className = 'status-dot';
}

document.getElementById('n8nFrame').addEventListener('load', () => {
  const o = document.getElementById('loadingOverlay');
  o.style.opacity = '0';
  setTimeout(() => { o.style.display = 'none'; o.style.opacity = '1'; }, 300);
  document.getElementById('statusDot').className = 'status-dot';
  injectN8NSidebarHider();
});

function injectN8NSidebarHider() {
  try {
    const doc = document.getElementById('n8nFrame').contentDocument;
    if (!doc) return;
    const id = '__custom_hide_sidebar__';
    if (doc.getElementById(id)) return;
    const style = doc.createElement('style');
    style.id = id;
    style.textContent = `
      [data-test-id="main-sidebar"], .el-aside, aside.el-aside, #side-menu, .side-menu, nav.n8n-menu,
      [class*="sidebar"]:not([class*="right"]):not([class*="Right"]) {
        display: none !important; width: 0 !important; min-width: 0 !important; overflow: hidden !important;
      }
      [data-test-id="workflow-crumbs"], [data-test-id="workflow-name-container"],
      [data-test-id="project-home-nav"], .breadcrumbs, .n8n-route-breadcrumbs,
      [class*="breadcrumb"], [class*="Breadcrumb"], [class*="workflowName"],
      [class*="workflow-name"], [class*="headerBreadcrumbs"], [class*="header-breadcrumbs"] {
        display: none !important; height: 0 !important; overflow: hidden !important;
      }
      .el-main, [class*="main-content"], [class*="mainContent"], [id*="main-content"] {
        margin-left: 0 !important; padding-left: 0 !important;
      }
      [data-test-id="workflow-list-new-workflow-button"],
      [data-test-id="new-workflow-button"],
      [data-test-id="add-resource-button"],
      button[class*="createWorkflow"], button[class*="create-workflow"],
      a[class*="createWorkflow"], a[class*="create-workflow"] {
        display: none !important;
      }
      [data-test-id="workflow-publish-button"],
      [data-test-id="workflow-save-button"] .el-dropdown__caret-button,
      button[class*="publishButton"], button[class*="publish-button"],
      [class*="workflowPublish"], [class*="workflow-publish"],
      [data-test-id="publish-button"] {
        display: none !important;
      }
      .el-overlay[aria-label*="ublish"], .el-dialog__wrapper,
      .el-overlay .el-dialog:has(form [type="text"][value*="Version"]),
      .el-overlay:has([data-test-id*="publish"]) {
        display: none !important;
      }
    `;
    doc.head.appendChild(style);
    const observer = new MutationObserver(() => { if (!doc.getElementById(id)) doc.head.appendChild(style); });
    observer.observe(doc.body, { childList: true, subtree: true });
  } catch {}
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/app/login';
}

init();
</script>
</body>
</html>
