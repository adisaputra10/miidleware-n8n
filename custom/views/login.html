<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — n8n Workspace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e5e5;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #ff6d5a 0%, #ff4f3b 100%);
      border-radius: 14px;
      margin-bottom: 14px;
    }

    .brand-icon svg { width: 28px; height: 28px; fill: #fff; }

    .brand h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .brand p {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      background: #242424;
      border: 1px solid #363636;
      border-radius: 9px;
      color: #f0f0f0;
      font-size: 15px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    input::placeholder { color: #555; }

    input:focus {
      border-color: #ff6d5a;
      box-shadow: 0 0 0 3px rgba(255,109,90,.12);
    }

    .submit-btn {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      background: linear-gradient(135deg, #ff6d5a 0%, #ff4f3b 100%);
      border: none;
      border-radius: 9px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }

    .submit-btn:hover { opacity: .9; }
    .submit-btn:active { transform: scale(.99); }
    .submit-btn:disabled { opacity: .45; cursor: not-allowed; }

    .error-box {
      display: none;
      margin-top: 14px;
      padding: 11px 14px;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      font-size: 13px;
      color: #f87171;
    }

    .divider {
      height: 1px;
      background: #252525;
      margin: 24px 0;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: #444;
    }

    .hint code {
      background: #252525;
      border-radius: 4px;
      padding: 1px 5px;
      color: #888;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <!-- n8n-like bolt icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"/>
        </svg>
      </div>
      <h1>n8n Workspace</h1>
      <p>Masuk untuk mengakses workflow editor</p>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Masukkan username"
          autocomplete="username"
          required
          autofocus
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Masukkan password"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Masuk</button>
      <div class="error-box" id="errorBox"></div>
    </form>

    <div class="divider"></div>
    <p class="hint">Username: <code>admin</code> &nbsp;·&nbsp; Password: <code>admin123</code></p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Memproses...';
      errorBox.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        const data = await res.json();

        if (data.success) {
          window.location.href = data.redirect || '/app/dashboard';
        } else {
          showError(data.message || 'Login gagal. Coba lagi.');
        }
      } catch {
        showError('Tidak dapat terhubung ke server. Coba lagi.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Masuk';
      }
    });

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }
  </script>
</body>
</html>
